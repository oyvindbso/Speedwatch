name: Speedwatch

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.19"

options:
  bundleIdPrefix: com.speedwatch
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:

  # ─── iOS App ────────────────────────────────────────────────────────────────
  Speedwatch:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      # iOS-only source files (app, views, EPUB parser)
      - path: Speedwatch/iOS
        type: group
      # Shared: lightweight BookInfo (Codable struct, no UIKit/CoreData)
      - path: Speedwatch/Shared/Models/BookInfo.swift
      # iOS-only: Core Data NSManagedObject subclass
      - path: Speedwatch/Shared/Models/Book.swift
      # iOS-only: Core Data + CloudKit stack
      - path: Speedwatch/Shared/Persistence/DataController.swift
      # Shared: WatchConnectivity (uses #if os(iOS)/#if os(watchOS) guards)
      - path: Speedwatch/Shared/Services/WatchConnectivityManager.swift
      # Shared: Notification.Name constants
      - path: Speedwatch/Shared/Services/NotificationNames.swift
    resources:
      - path: Speedwatch/Shared/Persistence/Speedwatch.xcdatamodeld
      - path: Speedwatch/iOS/Assets.xcassets
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.speedwatch.ios
        INFOPLIST_FILE: Speedwatch/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: Speedwatch/iOS/Speedwatch.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: SpeedwatchWatchApp
        embed: true
      - package: ZIPFoundation
        product: ZIPFoundation

  # ─── Apple Watch App ─────────────────────────────────────────────────────────
  SpeedwatchWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      # Watch-only source files
      - path: Speedwatch/Watch
        type: group
      # Shared: lightweight BookInfo (Codable struct, no UIKit/CoreData)
      - path: Speedwatch/Shared/Models/BookInfo.swift
      # Shared: WatchConnectivity (uses #if os(iOS)/#if os(watchOS) guards)
      - path: Speedwatch/Shared/Services/WatchConnectivityManager.swift
      # Shared: Notification.Name constants
      - path: Speedwatch/Shared/Services/NotificationNames.swift
    resources:
      - path: Speedwatch/Watch/Assets.xcassets
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.speedwatch.watchkitapp
        INFOPLIST_FILE: Speedwatch/Watch/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
